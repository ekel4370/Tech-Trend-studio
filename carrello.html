<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend Studio - Carrello</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --accent-green: #08d962;
            --dark-bg: #0f0f0f;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
            --payment-orange: #ff9900;
            --nav-bg: rgba(30, 30, 30, 0.95);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            height: 70px;
            background: var(--sidebar-bg);
            padding-left: 20px;
            border-bottom-right-radius: 40px; 
            border-bottom: 2px solid var(--primary-blue);
            width: fit-content;
            padding-right: 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .logo-box { background: white; padding: 5px; border-radius: 12px; display: flex; align-items: center; }
        .logo-box img { max-width: 45px; }
        header h1 { margin-left: 15px; font-size: 1.2rem; letter-spacing: 2px; color: white; margin: 0; }

        /* --- Barra di Navigazione (Pillola) --- */
        .nav-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
        }

        .bottom-nav {
            background: var(--nav-bg);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }

        .nav-pill {
            position: absolute;
            background: #f4f4f4;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            z-index: 0;
        }

        .nav-item {
            color: #999;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
            position: relative;
            z-index: 1;
        }

        .nav-item.active { color: #000; }
        .nav-divider { width: 1px; height: 25px; background: #444; margin: 0 5px; z-index: 1; }

        /* --- Sezione Carrello --- */
        main {
            padding: 150px 20px 50px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
