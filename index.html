<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend Studio</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --accent-green: #08d962;
            --dark-bg: #0f0f0f;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Header con Logo che taglia la fascia blu (Linee bianche del tuo schizzo) */
        header {
            display: flex;
            align-items: center;
            height: 80px;
            background: var(--sidebar-bg);
            position: relative;
            padding-left: 20px;
            /* Smussatura interna come da disegno */
            border-bottom-right-radius: 40px; 
            border-bottom: 2px solid var(--primary-blue);
            width: fit-content;
            padding-right: 40px;
        }

        .logo-box {
            background: white;
            padding: 8px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 10;
        }

        .logo-box img {
            max-width: 50px;
            height: auto;
        }

        header h1 {
            margin-left: 20px;
            font-size: 1.4rem;
            letter-spacing: 2px;
            color: white;
        }

        /* Pulsante Apertura Menu (Schiacciato al lato) */
        .menu-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary-blue);
            color: white;
            padding: 20px 8px;
            border-radius: 20px 0 0 20px;
            cursor: pointer;
            z-index: 1001;
            writing-mode: vertical-rl;
            font-size: 11px;
            font-weight: bold;
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        /* Sidebar con Bordi Smussati (Seguendo la tua linea bianca) */
        .sidebar {
            position: fixed;
            right: -280px;
            top: 5%;
            height: 90%;
            width: 240px;
            background: var(--sidebar-bg);
            border-radius: 40px 0 0 40px; /* Smussatura larga come da schizzo */
            border: 2px solid var(--accent-green);
            border-right: none;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            gap: 12px;
            z-index: 1000;
            box-shadow: -10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.open {
            right: 0;
        }

        .nav-button {
            background: #37475a;
            color: white;
            padding: 14px;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .nav-button:hover {
            border-color: var(--accent-green);
            background: #485a70;
        }

        /* Contenuto principale */
        .main-content {
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .payment-banner {
            background: white;
            color: black;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            border-left: 10px solid #ff9900;
            margin-bottom: 40px;
            text-align: center;
            max-width: 80%;
        }

        .card-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 20px;
            width: 260px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #333;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--accent-green);
            transform: translateY(-10px);
        }

        .card h3 { color: white; margin-bottom: 10px; }
        .price-tag { color: var(--accent-green); font-size: 1.4rem; font-weight: bold; }

    </style>
</head>
<body>

    <header>
        <div class="logo-box">
            <img src="logo.png" alt="Logo">
        </div>
        <h1>TECH TREND</h1>
    </header>

    <div class="menu-toggle" onclick="toggleMenu()" id="toggleBtn">MENU ◀</div>

    <nav class="sidebar" id="sidebar">
        <h3 style="text-align:center; color:var(--accent-green);">NAVIGAZIONE</h3>
        <a href="index.html" class="nav-button">🏠 HOME</a>
        <a href="tech.html" class="nav-button">💻 TECH SIDE</a>
        <a href="trend.html" class="nav-button">🎬 TREND SIDE</a>
        <hr style="border: 0.5px solid #444; width: 100%;">
        <a href="carrello.html" class="nav-button">🛒 CARRELLO</a>
        <a href="faq.html" class="nav-button">❓ DOMANDE (FAQ)</a>
    </nav>

    <div class="main-content">
        <div class="payment-banner">
            Accettiamo pagamenti rapidi tramite Codici Ricarica Amazon o Google Play.
        </div>

        <div class="card-container">
            <a href="tech.html" class="card">
                <h3>TECH</h3>
                <p>Script Python e Web Dev</p>
                <div class="price-tag">da €5</div>
            </a>
            <a href="trend.html" class="card">
                <h3>TREND</h3>
                <p>Video B-Roll e Grafiche</p>
                <div class="price-tag">da €10</div>
            </a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const btn = document.getElementById('toggleBtn');
            sidebar.classList.toggle('open');
            
            if(sidebar.classList.contains('open')) {
                btn.innerHTML = 'CHIUDI ▶';
                btn.style.right = '240px'; // Si sposta insieme al menu
            } else {
                btn.innerHTML = 'MENU ◀';
                btn.style.right = '0';
            }
        }
    </script>

</body>
</html>
