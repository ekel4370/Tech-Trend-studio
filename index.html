<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend Studio</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --accent-green: #08d962;
            --dark-bg: #0f0f0f;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
            --payment-orange: #ff9900;
            --nav-bg: rgba(30, 30, 30, 0.95);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            overflow-x: hidden;
        }

        .blur-effect {
            filter: blur(8px);
        }

        /* --- Header --- */
        header {
            display: flex;
            align-items: center;
            height: 70px;
            background: var(--sidebar-bg);
            padding-left: 20px;
            border-bottom-right-radius: 40px; 
            border-bottom: 2px solid var(--primary-blue);
            width: fit-content;
            padding-right: 40px;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
        }

        .logo-box {
            background: white;
            padding: 5px;
            border-radius: 12px;
            display: flex;
            align-items: center;
        }

        .logo-box img { max-width: 45px; }

        header h1 {
            margin-left: 15px;
            font-size: 1.2rem;
            letter-spacing: 2px;
            color: white;
        }

        /* --- Barra di Navigazione Inferiore con SCORRIMENTO FLUIDO --- */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--nav-bg);
            padding: 8px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 1000;
            /* Necessario per il posizionamento della pillola */
            position: relative; 
        }

        /* L'elemento "Pillola" bianca che SCORRE */
        .nav-pill {
            position: absolute;
            background: #f4f4f4;
            border-radius: 12px;
            transition: all 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55); /* Effetto scorrimento fluido e molleggio */
            z-index: -1; /* Sta sotto il testo */
            box-shadow: 0 2px 10px rgba(255,255,255,0.2);
        }

        .nav-item {
            color: #999;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.3s ease;
            cursor: pointer;
            position: relative; /* Per stare sopra la pillola */
            z-index: 1;
        }

        .nav-item:hover { color: white; }
        
        /* Quando un item è attivo, cambiamo solo il colore del testo */
        .nav-item.active { 
            color: #000; 
        }

        .nav-divider { width: 1px; height: 25px; background: #444; margin: 0 5px; z-index: 1; }

        /* --- Struttura Single Page (Invariata) --- */
        main {
            padding: 110px 20px 150px 20px; /* Più spazio sotto per non coprire l'ultima sezione */
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-container {
            margin-bottom: 60px;
            scroll-margin-top: 120px;
        }

        .payment-banner {
            background: white;
            color: black;
            padding: 15px 25px;
            border-radius: 15px;
            font-weight: bold;
            border-left: 10px solid var(--payment-orange);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .article-card {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #333;
            margin-bottom: 40px;
        }

        .article-card.tech { border-top: 8px solid #00a8e8; }
        .article-card.trend { border-top: 8px solid #3adb76; }

        .article-card h2 { font-size: 2rem; margin-top: 0; color: white; text-align: center; }

        .article-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .item { background: #2a2a2a; padding: 20px; border-radius: 15px; border: 1px solid #444; }
        .item h3 { margin-top: 0; color: var(--accent-green); font-size: 1.1rem; }
        .item p { font-size: 0.9rem; color: #ccc; }
        .item .price { font-weight: bold; color: white; margin-top: 10px; display: block; }

        /* --- Overlay (Invariato) --- */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0); display: none; 
            justify-content: center; align-items: center; z-index: 2000;
            transition: background-color 0.4s ease;
        }
        .overlay.show { display: flex; background-color: rgba(0, 0, 0, 0.7); }
        .overlay-content {
            background: white; color: black; padding: 40px; border-radius: 20px;
            max-width: 500px; width: 90%; position: relative;
            border-left: 15px solid var(--payment-orange);
            transform: translateY(100vh); transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .overlay.show .overlay-content { transform: translateY(0); }
        .close-overlay { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pageWrapper">
        <header>
            <div class="logo-box"><img src="logo.png" alt="Logo"></div>
            <h1>TECH TREND</h1>
        </header>

        <div style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000;">
            <nav class="bottom-nav" id="bottomNav">
                <div class="nav-pill" id="navPill"></div>

                <a href="#" class="nav-item active" id="nav-home">Home</a>
                <div class="nav-divider"></div>
                <a href="#tech-section" class="nav-item" id="nav-tech">Tech Side</a>
                <a href="#trend-section" class="nav-item" id="nav-trend">Trend Side</a>
                <div class="nav-divider"></div>
                <a href="carrello.html" class="nav-item">Carrello</a>
                <a href="faq.html" class="nav-item">FAQ</a>
            </nav>
        </div>

        <main id="top">
            <div class="payment-banner">
                <span>Accettiamo pagamenti rapidi tramite Codici Ricarica Amazon o Google Play.</span>
                <span style="color:var(--primary-blue); text-decoration:underline; cursor:pointer;" onclick="openOverlay()">di più</span>
            </div>

            <section id="tech-section" class="section-container">
                <div class="article-card tech">
                    <h2>TECH SIDE</h2>
                    <div class="article-list">
                        <div class="item">
                            <h3>Script Python</h3>
                            <p>Automazioni personalizzate.</p>
                            <span class="price">da €5,00</span>
                        </div>
                    </div>
                </div>
            </section>

            <section id="trend-section" class="section-container">
                <div class="article-card trend">
                    <h2>TREND SIDE</h2>
                    <div class="article-list">
                        <div class="item">
                            <h3>Video B-Roll</h3>
                            <p>Editing cinematografico.</p>
                            <span class="price">da €10,00</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="overlay" id="paymentOverlay" onclick="closeOverlayIfOutside(event)">
        <div class="overlay-content">
            <span class="close-overlay" onclick="closeOverlay()">&times;</span>
            <h2>Pagamenti</h2>
            <p>Sicuri, rapidi e privati.</p>
        </div>
    </div>

    <script>
        // --- SCRIPT PER LO SCORRIMENTO FLUIDO DELLA PILLOLA ---
        const navPill = document.getElementById('navPill');
        const navItems = document.querySelectorAll('.nav-item');
        const sections = document.querySelectorAll('.section-container');

        // Mappa ID sezione -> ID tasto nav
        const sectionNavMap = {
            'tech-section': 'nav-tech',
            'trend-section': 'nav-trend',
            'home': 'nav-home'
        };

        // Funzione che sposta FISICAMENTE la pillola bianca
        function movePillTo(targetItem) {
            if (!targetItem) return;
            
            // Calcoliamo posizione e dimensioni del tasto target
            const rect = targetItem.getBoundingClientRect();
            const navRect = document.getElementById('bottomNav').getBoundingClientRect();

            // Spostiamo la pillola
            navPill.style.width = `${rect.width}px`;
            navPill.style.height = `${rect.height}px`;
            navPill.style.left = `${rect.left - navRect.left}px`;
            navPill.style.top = `${rect.top - navRect.top}px`;
        }

        // 1. Aggiorna la pillola all'avvio sulla Home
        window.addEventListener('load', () => {
            movePillTo(document.getElementById('nav-home'));
        });

        // 2. ScrollSpy: Rileva la posizione e fa SCORRERE la pillola
        window.addEventListener('scroll', () => {
            let currentSectionId = 'home';
            
            // Trova la sezione visibile
            sections.forEach(section => {
                const sectionTop = section.offsetTop;
                if (pageYOffset >= sectionTop - 150) {
                    currentSectionId = section.getAttribute('id');
                }
            });

            const activeNavItemId = sectionNavMap[currentSectionId];
            const activeNavItem = document.getElementById(activeNavItemId);

            // Rimuove active da tutti, aggiunge al corrente (per il colore del testo)
            navItems.forEach(item => item.classList.remove('active'));
            if (activeNavItem) {
                activeNavItem.classList.add('active');
                // Fa scivolare la pillola sul nuovo tasto attivo
                movePillTo(activeNavItem);
            }
        });


        // --- Funzioni Overlay (Invariate) ---
        function openOverlay() {
            const overlay = document.getElementById('paymentOverlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.add('show');
                document.getElementById('pageWrapper').classList.add('blur-effect');
            }, 10);
            document.body.style.overflow = 'hidden';
        }

        function closeOverlay() {
            const overlay = document.getElementById('paymentOverlay');
            overlay.classList.remove('show');
            document.getElementById('pageWrapper').classList.remove('blur-effect');
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
            document.body.style.overflow = '';
        }

        function closeOverlayIfOutside(event) {
            if (event.target.id === 'paymentOverlay') { closeOverlay(); }
        }
    </script>
</body>
</html>
