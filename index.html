<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend Studio</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --accent-green: #08d962;
            --dark-bg: #1a1a1a;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            overflow-x: hidden;
        }

        /* Header con Logo e Scritta affiancati */
        header {
            display: flex;
            align-items: center;
            padding: 20px;
            background: #232f3e;
            border-bottom: 3px solid var(--primary-blue);
        }

        .logo-container img {
            max-width: 60px; /* Dimensione ridotta per stare di lato */
            margin-right: 15px;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
        }

        /* Pulsante per aprire il menu (schiacciato al lato) */
        .menu-toggle {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary-blue);
            color: white;
            padding: 15px 5px;
            border-radius: 10px 0 0 10px;
            cursor: pointer;
            z-index: 1000;
            writing-mode: vertical-rl;
            font-weight: bold;
            font-size: 12px;
        }

        /* Sidebar Mobile (A comparsa) */
        .sidebar {
            position: fixed;
            right: -250px; /* Nascosta inizialmente */
            top: 0;
            width: 200px;
            height: 100%;
            background: var(--sidebar-bg);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            padding: 60px 20px;
            gap: 15px;
            z-index: 999;
            border-left: 2px solid var(--accent-green);
        }

        .sidebar.open {
            right: 0; /* Mostra menu */
        }

        .nav-button {
            background: #37475a;
            color: white;
            padding: 15px;
            text-decoration: none;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid transparent;
        }

        .nav-button:hover {
            border-color: var(--accent-green);
        }

        /* Contenuto Principale */
        .main-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .payment-info {
            background: #fff;
            color: #000;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            border-left: 8px solid #ff9900;
            margin: 20px 0;
            max-width: 90%;
        }

        .grid {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: #252525;
            padding: 20px;
            border-radius: 15px;
            width: 250px;
            text-align: center;
            text-decoration: none;
            color: white;
            border: 1px solid #444;
        }

        .price { color: var(--accent-green); font-size: 1.2rem; display: block; margin-top: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Logo">
        </div>
        <h1>TECH TREND</h1>
    </header>

    <div class="menu-toggle" onclick="toggleMenu()">MENU ◀</div>

    <nav class="sidebar" id="sidebar">
        <a href="index.html" class="nav-button">🏠 HOME</a>
        <a href="tech.html" class="nav-button">💻 TECH</a>
        <a href="trend.html" class="nav-button">🎬 TREND</a>
    </nav>

    <div class="main-content">
        <div class="payment-info">
            Accettiamo pagamenti rapidi tramite Codici Ricarica Amazon o Google Play.
        </div>

        <div class="grid">
            <a href="tech.html" class="card">
                <h3>TECH</h3>
                <p>Coding e Automazioni</p>
                <span class="price">da €5</span>
            </a>
            <a href="trend.html" class="card">
                <h3>TREND</h3>
                <p>Video e Social Design</p>
                <span class="price">da €10</span>
            </a>
        </div>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
            const btn = document.querySelector('.menu-toggle');
            btn.innerHTML = sidebar.classList.contains('open') ? 'CHIUDI ▶' : 'MENU ◀';
        }
    </script>

</body>
</html>
