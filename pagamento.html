<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech & Trend - Metodo di Pagamento</title>
    <style>
        :root {
            --primary-blue: #284b99;
            --dark-bg: #0f0f0f;
            --sidebar-bg: #232f3e;
            --light-text: #f4f4f4;
            --payment-orange: #ff9900;
            --google-play: #34a853;
            --nav-bg: rgba(30, 30, 30, 0.95);
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--light-text);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            align-items: center;
            height: 70px;
            background: var(--sidebar-bg);
            padding-left: 20px;
            border-bottom-right-radius: 40px; 
            border-bottom: 2px solid var(--primary-blue);
            width: fit-content;
            padding-right: 40px;
            position: fixed;
            top: 0; left: 0; z-index: 100;
        }

        .logo-box { background: white; padding: 5px; border-radius: 12px; display: flex; align-items: center; }
        .logo-box img { max-width: 45px; }
        header h1 { margin-left: 15px; font-size: 1.2rem; letter-spacing: 2px; color: white; margin: 0; }

        main {
            flex: 1;
            padding: 150px 20px 50px 20px;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        .payment-box {
            background: #1e1e1e;
            padding: 40px;
            border-radius: 30px;
            border: 1px solid #333;
        }

        h2 { margin-bottom: 30px; letter-spacing: 1px; }

        .btn-payment {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            text-decoration: none;
            color: white;
        }

        .btn-amazon { background-color: var(--payment-orange); color: black; }
        .btn-google { background-color: var(--google-play); }

        .btn-payment:hover { transform: scale(1.03); filter: brightness(1.1); }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover { color: white; }

        .site-footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid #222;
        }

        .site-footer p { font-size: 0.75rem; color: #555; text-transform: uppercase; margin: 5px 0; }
    </style>
</head>
<body>

    <header>
        <div class="logo-box"><img src="logo.png" alt="Logo"></div>
        <h1>TECH TREND</h1>
    </header>
